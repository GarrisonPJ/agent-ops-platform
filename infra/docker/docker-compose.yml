name: agentops

services:
  db:
    image: postgres:16-alpine
    container_name: agentops-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentops}
      POSTGRES_DB: ${POSTGRES_DB:-agentops}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentops"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - agentops-net

  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: agentops-api
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-agentops}:${POSTGRES_PASSWORD:-agentops}@db:5432/${POSTGRES_DB:-agentops}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ../../backend/app:/app/app
      - /var/run/docker.sock:/var/run/docker.sock
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
    networks:
      - agentops-net

  web:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: agentops-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-5173}:5173"
    depends_on:
      - api
    volumes:
      - ../../frontend:/app
      - /app/node_modules
    networks:
      - agentops-net

volumes:
  pgdata:

networks:
  agentops-net:
    driver: bridge
