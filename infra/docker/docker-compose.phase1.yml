name: agentops

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentops}
      POSTGRES_DB: ${POSTGRES_DB:-agentops}
    volumes:
      - phase1-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentops}"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-agentops}:${POSTGRES_PASSWORD:-agentops}@db:5432/${POSTGRES_DB:-agentops}
      RUNNER_TOKEN: ${RUNNER_TOKEN:-local-runner-token}
      CORS_ORIGINS: http://localhost:${WEB_PORT:-5173}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 3s
      timeout: 3s
      retries: 20

  runner:
    build:
      context: ../..
      dockerfile: runner/Dockerfile
    environment:
      AGENTOPS_SERVER_URL: http://api:8000
      AGENTOPS_RUNNER_ID: compose-runner
      RUNNER_TOKEN: ${RUNNER_TOKEN:-local-runner-token}
    depends_on:
      api:
        condition: service_healthy

  web:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_TARGET: http://api:8000
    ports:
      - "${WEB_PORT:-5173}:5173"
    depends_on:
      api:
        condition: service_healthy

volumes:
  phase1-pgdata:
