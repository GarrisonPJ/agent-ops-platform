apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentops-executor
  namespace: agentops

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agentops-executor
  namespace: agentops
rules:
  # Jobs: create, read, watch, list, and delete
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "watch", "list", "delete"]
  # Pods: read listing and status (to find the pod associated with a job)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Pod logs: read to collect execution output
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agentops-executor
  namespace: agentops
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: agentops-executor
subjects:
  - kind: ServiceAccount
    name: agentops-executor
    namespace: agentops
