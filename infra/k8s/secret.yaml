apiVersion: v1
kind: Secret
metadata:
  name: agentops-secret
  namespace: agentops
type: Opaque
stringData:
  POSTGRES_USER:     "agentops"
  POSTGRES_PASSWORD: "agentops"
  # DO NOT commit real API keys here.
  # Create the Secret from an env file:
  #   kubectl create secret generic agentops-secret \
  #     --from-env-file=.env.production \
  #     --namespace agentops --dry-run=client -o yaml | kubectl apply -f -
  # Or use a sealed-secrets / external-secrets operator.
  LLM_API_KEY:       "YOUR_API_KEY_HERE"
