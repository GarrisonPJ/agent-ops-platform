apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentops-api
  namespace: agentops
  labels:
    app: agentops
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agentops
      component: api
  template:
    metadata:
      labels:
        app: agentops
        component: api
    spec:
      serviceAccountName: agentops-executor
      containers:
        - name: api
          image: agentops-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: agentops-config
            - secretRef:
                name: agentops-secret
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://agentops:agentops@agentops-db:5432/agentops"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
